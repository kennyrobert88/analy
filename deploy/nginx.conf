# ─────────────────────────────────────────────────────────────────────────────
# Analy — nginx Application Gateway
#
# Responsibilities:
#   • TLS termination (TLS 1.2 / 1.3 only, strong cipher suite)
#   • HTTP → HTTPS redirect
#   • IP-level rate limiting (backup to the in-process limiter in Express)
#   • Security response headers (HSTS, CSP, referrer policy, …)
#   • Request size enforcement
#   • Upstream keep-alive to the Node.js API
#   • Hiding server identity
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate-limit zones (keyed by client IP) ────────────────────────────────────
# api  : 120 req/min  (~2 req/s)
# auth : 20 req/15min (~1 req/45s) — prevents brute-force on the token endpoint
limit_req_zone $binary_remote_addr zone=api:10m  rate=2r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/3s;

# ── Upstream — the Node.js API container / process ───────────────────────────
upstream analy_api {
    server app:4000;          # Docker service name; change to 127.0.0.1:4000 for bare-metal
    keepalive 32;             # Keep 32 idle connections open to the upstream
    keepalive_timeout 65s;
}

# ── Hide nginx version from error pages and Server header ────────────────────
server_tokens off;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # Allow ACME HTTP-01 challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main server block ─────────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name _;                  # Replace with your domain in production

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/analy.crt;
    ssl_certificate_key /etc/ssl/private/analy.key;

    # Only TLS 1.2 and 1.3 — no SSLv3, TLS 1.0, TLS 1.1
    ssl_protocols TLSv1.2 TLSv1.3;

    # ECDHE for forward secrecy; CHACHA20 for mobile/embedded clients
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;  # Let the client pick (TLS 1.3 does this anyway)

    # Session resumption — reduces handshake latency on repeat connections
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;        # Disable tickets (forward-secrecy concern)

    # OCSP stapling — avoids client round-trips to the CA
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # Diffie-Hellman params (generate once: openssl dhparam -out /etc/ssl/dhparam.pem 2048)
    # ssl_dhparam /etc/ssl/dhparam.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    # HSTS — 1 year, include subdomains; add preload after confirming
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # No referrer info sent cross-origin
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Minimal permissions — no camera/mic/geo
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy — tighten per your frontend's actual needs
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size    512k;
    client_body_timeout     10s;
    client_header_timeout   10s;
    send_timeout            30s;

    # ── Health / readiness — no rate limit, no auth ───────────────────────────
    location = /health {
        proxy_pass         http://analy_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    location = /ready {
        proxy_pass         http://analy_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    # ── Authentication endpoints (strict rate limit) ──────────────────────────
    location /auth/ {
        limit_req       zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass          http://analy_api;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";  # enable keep-alive to upstream
        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }

    # ── API endpoints ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req        zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass          http://analy_api;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;   # long for /api/emails/sync
    }

    # ── Block everything else ─────────────────────────────────────────────────
    location / {
        return 404;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"Rate limit exceeded — please slow down"}';
    }

    error_page 502 503 /503.json;
    location = /503.json {
        internal;
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable — try again shortly"}';
    }
}
