version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Analy — production stack
#
# Services:
#   nginx   Application gateway (TLS termination, rate-limiting, headers)
#   app     Node.js API server
#
# Volumes:
#   db_data      Persistent SQLite database
#   nginx_logs   nginx access + error logs
#
# Quick start:
#   1. Copy .env.production.example → .env.production and fill in all values
#   2. Place your TLS cert/key in deploy/ssl/  (see README)
#   3. docker compose -f deploy/docker-compose.yml --env-file .env.production up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── nginx — Application Gateway ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl/analy.crt:/etc/ssl/certs/analy.crt:ro
      - ./ssl/analy.key:/etc/ssl/private/analy.key:ro
      - nginx_logs:/var/log/nginx
      # Uncomment for Let's Encrypt ACME challenge:
      # - certbot_webroot:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    # nginx should never need internet access directly
    # (upstream is app, not the internet)

  # ── Node.js API ────────────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: ../.env.production
    environment:
      NODE_ENV: production
      PORT: "4000"
      DB_PATH: /data/emails.db
    volumes:
      - db_data:/data
    expose:
      - "4000"         # Only reachable via nginx, not the host
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Optional: Let's Encrypt cert renewal ──────────────────────────────────
  # certbot:
  #   image: certbot/certbot:latest
  #   volumes:
  #     - certbot_certs:/etc/letsencrypt
  #     - certbot_webroot:/var/www/certbot
  #   entrypoint: >
  #     sh -c "trap exit TERM; while :; do
  #       certbot renew --webroot -w /var/www/certbot --quiet;
  #       sleep 12h & wait $${!}; done"

volumes:
  db_data:
  nginx_logs:
  # certbot_certs:
  # certbot_webroot:

networks:
  internal:
    driver: bridge
    internal: false   # app needs outbound for Google OAuth + Gmail API
